name: Publish Preview Release

on:
  push:
    branches:
      - main
      - beta
      - dev
    paths-ignore:
      - 'docs/**'
      - 'metadata.txt'
      - 'CHANGELOG.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release-preview:
    name: Build & Release Preview
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Setup Python ──────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 4. Run preview pipeline ──────────────────────────────────────
      - name: Run preview pipeline
        id: preview
        env:
          GITHUB_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python scripts/release/release_pipeline.py \
            --mode preview \
            --branch "${{ github.ref_name }}"

      # ── 5. Commit beta channel files ─────────────────────────────────
      - name: Commit beta channel files directly
        env:
          GH_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/user-guide/public/gemma-beta.xml docs/user-guide/public/latest-beta.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update beta channel files for preview ${{ steps.preview.outputs.revision }}" && git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main)

      # ── 6. Trigger docs deploy ───────────────────────────────────────
      - name: Trigger GitHub Pages Deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PREVIEW_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'deploy-docs.yml',
                ref: 'main',
              });
              console.log('🚀 Triggered Deploy VitePress Docs workflow');
            } catch (err) {
              console.log('⚠️ Could not trigger deploy-docs dispatch:', err.message);
            }
