name: Bug Report
description: File a bug report
title: "[BUG]: "
labels: ["bug"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a brief explanation.
      placeholder: E.g., The submit button stays disabled after filling out all required fields.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Explain how to recreate the bug step-by-step.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true

  - type: textarea
    id: suggestions
    attributes:
      label: Suggestions
      description: Any initial ideas on how to fix this or what might be causing it?
      placeholder: Optional workarounds or potential causes...
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        **Attachments:** You can drag and drop screenshots, logs, or recordings directly into any of the text fields above!