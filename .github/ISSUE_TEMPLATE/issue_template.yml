name: Bug Report
description: Report a bug found during testing
title: "[BUG]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us test! Please fill out as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: E.g., Clicking the login button shows a 500 server error instead of redirecting.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Staging / Testing
        - Production
        - Development
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: input
    id: browser-device
    attributes:
      label: Device / Browser Specs
      placeholder: E.g., Chrome v120 on macOS Sonoma / iPhone 15 iOS 17